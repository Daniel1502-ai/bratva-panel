<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Bratva Panel — Task Avansare</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-glow: rgba(192,57,43,0.5);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --muted: #666;
    --green: #27ae60;
    --green-dim: rgba(39,174,96,0.15);
    --yellow: #f39c12;
    --yellow-dim: rgba(243,156,18,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
  }

  /* ── SIDEBAR ── */
  :root { --sb-collapsed: 64px; --sb-expanded: 220px; }

  body { display: flex; min-height: 100vh; }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sb-collapsed);
    background: var(--dark2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transition: width 0.28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: -1px; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.28s;
  }
  .sidebar:hover { width: var(--sb-expanded); }
  .sidebar:hover::after { opacity: 1; }

  /* Brand */
  .sb-brand {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .sb-brand-icon {
    font-size: 22px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .sb-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    opacity: 0;
    transition: opacity 0.2s 0.05s;
  }
  .sidebar:hover .sb-brand-text { opacity: 1; }

  /* Nav links */
  .sb-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    gap: 2px;
    overflow: hidden;
  }
  .sb-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 44px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .sb-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .sb-link.active {
    color: var(--text);
    background: rgba(192,57,43,0.1);
    border-left-color: var(--red-bright);
  }
  .sb-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    line-height: 1;
  }
  .sb-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-label { opacity: 1; }

  /* Bottom user area */
  .sb-bottom {
    border-top: 1px solid var(--border);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sb-user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 18px;
    white-space: nowrap;
    overflow: hidden;
  }
  .sb-user-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    color: var(--muted);
  }
  .sb-user-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    opacity: 0;
    transition: opacity 0.18s 0.06s;
    min-width: 0;
  }
  .sidebar:hover .sb-user-info { opacity: 1; }
  .sb-user-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sb-username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .sb-logout {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 40px;
    background: transparent;
    color: var(--red-bright);
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sb-logout:hover { background: rgba(192,57,43,0.15); color: white; }
  .sb-logout-icon { font-size: 16px; flex-shrink: 0; width: 28px; text-align: center; }
  .sb-logout-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-logout-label { opacity: 1; }

  /* Main content offset */
  .main-content {
    margin-left: var(--sb-collapsed);
    flex: 1;
    min-width: 0;
    transition: margin-left 0.28s cubic-bezier(.4,0,.2,1);
  }
  /* ── PAGE HEADER ── */
  .page-header { padding: 40px 36px 28px; display: flex; align-items: flex-end; justify-content: space-between; }
  .page-header-left { display: flex; flex-direction: column; gap: 4px; }
  .page-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--red-bright); }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 6px; line-height: 1; }
  .page-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-top: 4px; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    padding: 0 36px 48px;
    align-items: start;
  }

  /* ── CREATE PANEL ── */
  .create-panel {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .panel-header {
    padding: 18px 22px;
    background: var(--dark3);
    border-bottom: 1px solid var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--text);
  }
  .panel-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); font-weight: 700;
  }
  .field input, .field textarea, .field select {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 500;
    background: var(--dark3); color: var(--text);
    border: 1px solid var(--border2); border-radius: 3px;
    padding: 10px 12px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--red); }
  .field textarea { resize: vertical; min-height: 90px; }
  .field select option { background: var(--dark3); }

  /* ── PRIORITY BUTTONS — scoped inside #createForm only ── */
  .priority-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .prio-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    padding: 8px; border: 1px solid var(--border2); border-radius: 3px;
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .prio-btn:hover { color: var(--text); }
  .prio-btn.active-scazut { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .prio-btn.active-normal { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .prio-btn.active-urgent { background: rgba(192,57,43,0.2); border-color: var(--red); color: var(--red-bright); }

  .btn-create {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    background: var(--red); color: white; border: none;
    padding: 13px; border-radius: 3px; cursor: pointer;
    transition: all 0.2s ease; width: 100%; margin-top: 4px;
  }
  .btn-create:hover { background: var(--red-bright); box-shadow: 0 0 20px var(--red-glow); transform: translateY(-1px); }
  .btn-create:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── TASKS LIST ── */
  .tasks-panel { display: flex; flex-direction: column; gap: 16px; }
  .tasks-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 7px 14px; border: 1px solid var(--border2); border-radius: 3px;
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { color: var(--text); border-color: var(--border2); background: var(--dark3); }
  .filter-btn.active { border-color: var(--red); color: var(--red-bright); }
  .tasks-count { margin-left: auto; font-size: 12px; letter-spacing: 1px; color: var(--muted); }

  .tasks-list { display: flex; flex-direction: column; gap: 10px; }

  .task-card {
    background: var(--dark2); border: 1px solid var(--border); border-radius: 4px;
    padding: 18px 20px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.15s, background 0.15s; position: relative; overflow: hidden;
  }
  .task-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .task-card.priority-scazut::before { background: var(--green); }
  .task-card.priority-normal::before { background: var(--yellow); }
  .task-card.priority-urgent::before { background: var(--red-bright); }
  .task-card.status-finalizat { opacity: 0.5; }
  .task-card:hover { border-color: var(--border2); background: var(--dark3); }

  .task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .task-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); line-height: 1.1; }
  .task-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .badge { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid; }
  .badge-scazut { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .badge-normal { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .badge-urgent { background: rgba(192,57,43,0.2); border-color: var(--red); color: var(--red-bright); }
  .badge-activ { background: rgba(52,152,219,0.15); border-color: #3498db; color: #5dade2; }
  .badge-finalizat { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .badge-anulat { background: rgba(100,100,100,0.2); border-color: #555; color: #888; }
  .badge-expirat { background: rgba(243,156,18,0.15); border-color: #f39c12; color: #f39c12; }
  .task-card.status-expirat { opacity: 0.65; }
  .task-card.status-expirat::before { background: #f39c12 !important; }

  .task-desc { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .task-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  .meta-item strong { color: #aaa; font-weight: 600; }

  .task-actions { display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
  .task-actions select {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: var(--dark3); color: var(--text);
    border: 1px solid var(--border2); border-radius: 3px; padding: 6px 10px;
    cursor: pointer; outline: none;
  }
  .btn-delete {
    margin-left: auto; font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border2); padding: 6px 12px;
    border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .btn-delete:hover { color: var(--red-bright); border-color: var(--red); background: rgba(192,57,43,0.1); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); border: 1px dashed var(--border2); border-radius: 4px; }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; letter-spacing: 1px; }

  .info-box {
    background: var(--dark2); border: 1px solid var(--border); border-radius: 4px;
    padding: 20px 22px; font-size: 14px; color: var(--muted); line-height: 1.6;
  }
  .info-box strong { color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--dark3); border: 1px solid var(--red); color: white;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px;
    padding: 14px 24px; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px var(--red-glow);
    transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-brand">
    <span class="sb-brand-icon">☭</span>
    <span class="sb-brand-text">BRATVA</span>
  </div>
  <nav class="sb-nav">
    <a href="/dashboard"  class="sb-link"><span class="sb-icon">🏠</span><span class="sb-label">Home</span></a>
    <a href="/bratva-panel"     class="sb-link"><span class="sb-icon">🔱</span><span class="sb-label">Bratva</span></a>
    <a href="/sputnik-panel"    class="sb-link"><span class="sb-icon">⚡</span><span class="sb-label">Sputnik</span></a>
    <a href="/task"       class="sb-link active"><span class="sb-icon">📋</span><span class="sb-label">Task</span></a>
    <a href="/calculator" class="sb-link"><span class="sb-icon">💰</span><span class="sb-label">Calculator</span></a>
    <a href="/invoiri-panel"   class="sb-link"><span class="sb-icon">📅</span><span class="sb-label">Învoiri</span></a>
    <a href="/admin"      class="sb-link" id="adminLink" style="display:none"><span class="sb-icon">🛡</span><span class="sb-label">Admin</span></a>
    <a href="/amenzi" class="sb-link"><span class="sb-icon">⚠️</span><span class="sb-label">Amenzi</span></a>
  </nav>
  <div class="sb-bottom">
    <div class="sb-user">
      <span class="sb-user-icon">👤</span>
      <div class="sb-user-info">
        <span class="sb-user-label">Conectat ca</span>
        <span class="sb-username" id="navUsername">—</span>
      </div>
    </div>
    <button class="sb-logout" onclick="logout()">
      <span class="sb-logout-icon">⏻</span>
      <span class="sb-logout-label">Logout</span>
    </button>
  </div>
</aside>
<div class="main-content">

<div class="page-header">
  <div class="page-header-left">
    <div class="page-label">Management</div>
    <div class="page-title">📋 Task Avansare</div>
    <div class="page-sub">Taskuri pentru avansarea în grad a membrilor organizației.</div>
  </div>
</div>

<div class="layout">

  <!-- LEFT -->
  <div id="leftPanel"></div>

  <!-- RIGHT -->
  <div class="tasks-panel">
    <div class="tasks-toolbar">
      <button class="filter-btn active" onclick="setFilter('all', this)">Toate</button>
      <button class="filter-btn" onclick="setFilter('activ', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('finalizat', this)">Finalizate</button>
      <button class="filter-btn" onclick="setFilter('anulat', this)">Anulate</button>
      <button class="filter-btn" onclick="setFilter('expirat', this)">⏰ Expirate</button>
      <span class="tasks-count" id="tasksCount"></span>
    </div>
    <div class="tasks-list" id="tasksList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let user;
let allTasks   = [];
let allMembers = [];
let myMemberNames = []; // names from bratva/sputnik matching user's CNP
let currentFilter    = "all";
let selectedPriority = "normal";   // global state, not read from DOM

// ── HELPERS ─────────────────────────────────────────────────
function isLeader(){ return user && user.role && user.role.toLowerCase() === "leader"; }

function showToast(msg, isError = false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isError ? "#f39c12" : "var(--red)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  const res = await fetch("/me");
  user = await res.json();
  if(!user){ location.href="/login"; return; }

  document.getElementById("navUsername").textContent = user.username;
  if(isLeader()) document.getElementById("adminLink").style.display = "";

  if(isLeader()){
    const mr = await fetch("/members");
    allMembers = await mr.json();
  } else {
    // Fetch member names matching this user's CNP
    try {
      const mnr = await fetch("/my-member-name");
      const mnData = await mnr.json();
      myMemberNames = mnData.names || [];
    } catch(e){ myMemberNames = []; }
  }

  renderLeftPanel();
  await loadTasks();
}

// ── LEFT PANEL ───────────────────────────────────────────────
function renderLeftPanel(){
  const el = document.getElementById("leftPanel");

  if(!isLeader()){
    el.innerHTML = `
      <div class="info-box">
        <strong>📋 Taskurile tale</strong><br><br>
        Aici sunt afișate taskurile atribuite ție sau tuturor membrilor.<br><br>
        Când finalizezi un task, marchează-l ca <strong>Finalizat</strong> folosind butonul de status.
      </div>`;
    return;
  }

  // Build member options
  const bratvaM  = allMembers.filter(m => m.faction === "Bratva");
  const sputnikM = allMembers.filter(m => m.faction === "Sputnik");

  let memberOptions = `<option value="all">— Toți membrii —</option>`;
  if(bratvaM.length){
    memberOptions += `<optgroup label="Bratva">`;
    bratvaM.forEach(m => { memberOptions += `<option value="${m.nume}">${m.nume}</option>`; });
    memberOptions += `</optgroup>`;
  }
  if(sputnikM.length){
    memberOptions += `<optgroup label="Sputnik">`;
    sputnikM.forEach(m => { memberOptions += `<option value="${m.nume}">${m.nume}</option>`; });
    memberOptions += `</optgroup>`;
  }
  if(!bratvaM.length && !sputnikM.length){
    memberOptions += `<option disabled>Nu există membri înregistrați</option>`;
  }

  el.innerHTML = `
    <div class="create-panel">
      <div class="panel-header">✚ Task Nou</div>
      <div class="panel-body" id="createForm">
        <div class="field">
          <label>Titlu task *</label>
          <input id="taskTitle" placeholder="ex: Participă la 3 acțiuni">
        </div>
        <div class="field">
          <label>Descriere</label>
          <textarea id="taskDesc" placeholder="Detalii despre ce trebuie făcut..."></textarea>
        </div>
        <div class="field">
          <label>Prioritate</label>
          <div class="priority-row" id="prioRow">
            <button class="prio-btn" id="prio-scazut" onclick="setPriority('scazut')">🟢 Scăzut</button>
            <button class="prio-btn active-normal" id="prio-normal" onclick="setPriority('normal')">🟡 Normal</button>
            <button class="prio-btn" id="prio-urgent" onclick="setPriority('urgent')">🔴 Urgent</button>
          </div>
        </div>
        <div class="field">
          <label>Fracțiune</label>
          <select id="taskFaction" onchange="updateMemberDropdown()">
            <option value="all">Toate fracțiunile</option>
            <option value="Bratva">Bratva</option>
            <option value="Sputnik">Sputnik</option>
          </select>
        </div>
        <div class="field">
          <label>Atribuit către</label>
          <select id="taskAssigned">${memberOptions}</select>
        </div>
        <div class="field">
          <label>Deadline (opțional)</label>
          <input type="datetime-local" id="taskDeadline" style="color-scheme:dark;">
        </div>
        <button class="btn-create" id="btnCreate" onclick="createTask()">✚ Creează Task</button>
      </div>
    </div>`;

  // Sync button state with current selectedPriority after render
  highlightPrioBtn(selectedPriority);
}

// ── PRIORITY — uses element IDs, no index guessing ──────────
function setPriority(val){
  selectedPriority = val;
  highlightPrioBtn(val);
}

function highlightPrioBtn(val){
  ["scazut","normal","urgent"].forEach(v => {
    const btn = document.getElementById("prio-" + v);
    if(!btn) return;
    btn.className = "prio-btn" + (v === val ? " active-" + v : "");
  });
}

// ── MEMBER DROPDOWN ──────────────────────────────────────────
function updateMemberDropdown(){
  const faction = document.getElementById("taskFaction").value;
  const sel     = document.getElementById("taskAssigned");

  let opts = `<option value="all">— Toți membrii —</option>`;
  const filtered = faction === "all" ? allMembers : allMembers.filter(m => m.faction === faction);
  const bm = filtered.filter(m => m.faction === "Bratva");
  const sm = filtered.filter(m => m.faction === "Sputnik");

  if(bm.length){
    opts += `<optgroup label="Bratva">`;
    bm.forEach(m => { opts += `<option value="${m.nume}">${m.nume}</option>`; });
    opts += `</optgroup>`;
  }
  if(sm.length){
    opts += `<optgroup label="Sputnik">`;
    sm.forEach(m => { opts += `<option value="${m.nume}">${m.nume}</option>`; });
    opts += `</optgroup>`;
  }
  if(!filtered.length) opts += `<option disabled>Nu există membri</option>`;

  sel.innerHTML = opts;
}

// ── CREATE TASK ──────────────────────────────────────────────
async function createTask(){
  const titleEl  = document.getElementById("taskTitle");
  const descEl   = document.getElementById("taskDesc");
  const factionEl= document.getElementById("taskFaction");
  const assignEl = document.getElementById("taskAssigned");
  const btnEl    = document.getElementById("btnCreate");

  const title = titleEl.value.trim();
  if(!title){ showToast("⚠ Titlul este obligatoriu!", true); return; }

  // Disable button to prevent double-submit
  btnEl.disabled = true;
  btnEl.textContent = "Se salvează...";

  const deadlineEl = document.getElementById("taskDeadline");
  const payload = {
    title,
    description: descEl.value.trim(),
    priority:    selectedPriority,
    faction:     factionEl.value,
    assignedTo:  assignEl.value,
    deadline:    deadlineEl ? deadlineEl.value : ""
  };

  try {
    const res = await fetch("/tasks", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });

    if(!res.ok){
      const errText = await res.text();
      showToast("⚠ Eroare: " + (errText || res.status), true);
      return;
    }

    // Reset form fields
    titleEl.value   = "";
    descEl.value    = "";
    factionEl.value = "all";
    updateMemberDropdown();
    if(document.getElementById("taskDeadline")) document.getElementById("taskDeadline").value = "";

    // Reset priority back to "normal" — using IDs, never index
    selectedPriority = "normal";
    highlightPrioBtn("normal");

    showToast("✓ Task creat cu succes");
    await loadTasks();

  } catch(err){
    showToast("⚠ Eroare de rețea!", true);
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = "✚ Creează Task";
  }
}

// ── TASKS LIST ───────────────────────────────────────────────
async function loadTasks(){
  const res = await fetch("/tasks");
  allTasks = await res.json();
  renderTasks();
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTasks();
}

function renderTasks(){
  const list = document.getElementById("tasksList");
  let tasks = allTasks;

  if(!isLeader()){
    tasks = tasks.filter(t => {
      if(t.assignedTo === "all") return true;
      if(t.assignedTo === user.username) return true;
      // Also show tasks assigned to the member's name from bratva/sputnik (matched by CNP)
      if(myMemberNames.length && myMemberNames.includes(t.assignedTo)) return true;
      return false;
    });
  }
  if(currentFilter !== "all"){
    tasks = tasks.filter(t => t.status === currentFilter);
  }

  document.getElementById("tasksCount").textContent =
    `${tasks.length} task${tasks.length !== 1 ? "uri" : ""}`;

  if(!tasks.length){
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>Nu există taskuri${currentFilter !== "all" ? " în această categorie" : ""}.</p>
      </div>`;
    return;
  }

  list.innerHTML = tasks.map(t => {
    const leader       = isLeader();
    const assignedLabel = t.assignedTo === "all" ? "Toți membrii" : t.assignedTo;
    const factionLabel  = t.faction    === "all" ? "Toate fracțiunile" : t.faction;
    const date = new Date(t.createdAt).toLocaleDateString("ro-RO");
    const deadlineStr = t.deadline ? new Date(t.deadline).toLocaleString("ro-RO", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : null;
    const isExpired = t.status === "expirat";

    return `
    <div class="task-card priority-${t.priority} status-${t.status}" id="task-${t.id}">
      <div class="task-top">
        <div class="task-title">${t.title}</div>
        <div class="task-badges">
          <span class="badge badge-${t.priority}">${t.priority}</span>
          <span class="badge badge-${t.status}">${t.status}</span>
          ${deadlineStr ? `<span class="badge" style="background:rgba(243,156,18,0.1);border-color:#f39c12;color:#f39c12;">⏰ ${deadlineStr}</span>` : ""}
        </div>
      </div>
      ${t.description ? `<div class="task-desc">${t.description}</div>` : ""}
      <div class="task-meta">
        <div class="meta-item">👤 <strong>${assignedLabel}</strong></div>
        <div class="meta-item">⚡ <strong>${factionLabel}</strong></div>
        <div class="meta-item">📅 <strong>${date}</strong></div>
        ${deadlineStr ? `<div class="meta-item" style="color:${isExpired?"#f39c12":"#aaa"}">⏰ Deadline: <strong>${deadlineStr}</strong></div>` : ""}
      </div>
      <div class="task-actions">
        <select onchange="updateStatus(${t.id}, this.value)" ${isExpired && !leader ? "disabled" : ""}>
          <option value="activ"     ${t.status === "activ"     ? "selected" : ""}>Activ</option>
          <option value="finalizat" ${t.status === "finalizat" ? "selected" : ""}>Finalizat</option>
          ${leader ? `<option value="anulat" ${t.status === "anulat" ? "selected" : ""}>Anulat</option>` : ""}
          ${leader ? `<option value="expirat" ${t.status === "expirat" ? "selected" : ""}>Expirat</option>` : ""}
        </select>
        ${leader ? `<button class="btn-delete" onclick="deleteTask(${t.id})">🗑 Șterge</button>` : ""}
      </div>
    </div>`;
  }).join("");
}

async function updateStatus(id, status){
  await fetch(`/tasks/${id}`, {
    method:  "PATCH",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ status })
  });
  showToast("✓ Status actualizat");
  await loadTasks();
}

async function deleteTask(id){
  if(!confirm("Ștergi acest task?")) return;
  await fetch(`/tasks/${id}`, { method: "DELETE" });
  showToast("✓ Task șters");
  await loadTasks();
}

async function logout(){
  await fetch("/logout", { method: "POST" }).catch(() => {});
  location.href="/login";
}

init();
</script>
