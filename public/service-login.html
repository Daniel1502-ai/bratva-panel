<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Service Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2477c9; --blue-bright:#4aa3ff; --blue-glow:rgba(36,119,201,.5);
    --dark:#070a0f; --dark2:#0f141b; --dark3:#161d27; --dark4:#1e2731;
    --border:#1f2a36; --border2:#2a3949; --text:#e8eef5; --muted:#6a7584;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Rajdhani',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:var(--dark);
    background-image:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.72)), url("https://i.imgur.com/7YqgLz2.jpeg");
    background-size:cover; background-position:center; background-attachment:fixed;
    color:var(--text);
  }
  .card{
    width:400px; background:rgba(15,20,27,.92);
    border:1px solid var(--border); border-radius:4px; overflow:hidden;
    box-shadow:0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(36,119,201,.08);
    backdrop-filter:blur(8px);
  }
  .card::before{
    content:''; display:block; height:2px;
    background:linear-gradient(90deg, transparent, var(--blue-bright), transparent);
  }
  .card-header{ padding:32px 36px 24px; text-align:center; border-bottom:1px solid var(--border) }
  .brand{
    font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:8px;
    color:var(--blue-bright); text-shadow:0 0 30px var(--blue-glow);
  }
  .brand-sub{ font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:6px }
  .tabs{ display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--border) }
  .tab-btn{
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:3px; text-transform:uppercase; color:var(--muted);
    background:transparent; border:none; padding:14px; cursor:pointer;
    border-bottom:2px solid transparent; transition:.2s;
  }
  .tab-btn:hover{ color:var(--text); background:rgba(255,255,255,.02) }
  .tab-btn.active{ color:var(--blue-bright); border-bottom-color:var(--blue-bright); background:rgba(36,119,201,.06) }
  .card-body{ padding:28px 36px 32px }
  .tab-panel{ display:none }
  .tab-panel.active{ display:flex; flex-direction:column; gap:14px }
  .field{ display:flex; flex-direction:column; gap:6px }
  .field label{ font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); font-weight:700 }
  .field input{
    font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:500;
    background:var(--dark3); color:var(--text); border:1px solid var(--border2);
    border-radius:3px; padding:11px 14px; outline:none; transition:.15s; width:100%;
  }
  .field input:focus{ border-color:var(--blue); background:var(--dark4) }
  .btn-main{
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:3px; text-transform:uppercase; background:var(--blue);
    color:#fff; border:none; padding:13px; border-radius:3px;
    cursor:pointer; width:100%; margin-top:4px; transition:.2s;
  }
  .btn-main:hover{ background:var(--blue-bright); box-shadow:0 0 24px var(--blue-glow); transform:translateY(-1px) }
  .msg{ font-size:12px; padding:10px 14px; border-radius:3px; display:none; font-weight:600 }
  .msg.error{ background:rgba(192,57,43,.15); border:1px solid #c0392b; color:#e74c3c }
  .msg.success{ background:rgba(39,174,96,.12); border:1px solid #27ae60; color:#2ecc71 }
  .msg.show{ display:block }
  .card-footer{ padding:14px 36px; border-top:1px solid var(--border); text-align:center; font-size:11px; letter-spacing:1px; color:var(--muted) }
  .back{ position:fixed; top:20px; left:20px; z-index:10; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:12px; letter-spacing:2px; text-transform:uppercase; text-decoration:none; color:rgba(255,255,255,.65); background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.2); padding:7px 16px; border-radius:3px; backdrop-filter:blur(6px); transition:color .2s,border-color .2s,background .2s; }
  .back:hover{ color:var(--blue-bright); border-color:rgba(74,163,255,.6); background:rgba(36,119,201,.15); }
</style>
</head>
<body>

<a class="back" href="/index.html">← Înapoi</a>

<div class="card">
  <div class="card-header">
    <div class="brand">⚙ SERVICE</div>
    <div class="brand-sub">Management System</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login',this)">⚡ Login</button>
    <button class="tab-btn" onclick="switchTab('register',this)">✚ Register</button>
  </div>
  <div class="card-body">
    <div class="tab-panel active" id="panel-login">
      <div class="field"><label>Username</label><input id="loginUser" placeholder="Introdu username"></div>
      <div class="field"><label>Parolă</label><input id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="msg error" id="loginErr"></div>
      <button class="btn-main" onclick="login()">Autentificare →</button>
    </div>
    <div class="tab-panel" id="panel-register">
      <div class="field"><label>Username</label><input id="regUser"></div>
      <div class="field"><label>CNP</label><input id="regCnp"></div>
      <div class="field"><label>Parolă</label><input id="regPass" type="password"></div>
      <div class="field"><label>Confirmă Parola</label><input id="regPass2" type="password" onkeydown="if(event.key==='Enter')register()"></div>
      <div class="msg error" id="regErr"></div>
      <div class="msg success" id="regOk">Cont creat cu succes!</div>
      <button class="btn-main" onclick="register()">Creează Cont →</button>
    </div>
  </div>
  <div class="card-footer">Service Panel · FiveM</div>
</div>

<script>
function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.msg').forEach(m=>m.classList.remove('show'));
}
async function login(){
  const username=document.getElementById('loginUser').value.trim();
  const password=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr'); err.classList.remove('show');
  if(!username||!password){ err.textContent='⚠ Completați toate câmpurile.'; err.classList.add('show'); return; }
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,org:'service'})});
  if(res.ok) location.href='service-dashboard.html';
  else { err.textContent='⚠ '+(await res.text()||'Date incorecte.'); err.classList.add('show'); }
}
async function register(){
  const username=document.getElementById('regUser').value.trim();
  const cnp=document.getElementById('regCnp').value.trim();
  const password=document.getElementById('regPass').value;
  const password2=document.getElementById('regPass2').value;
  const err=document.getElementById('regErr'), ok=document.getElementById('regOk');
  err.classList.remove('show'); ok.classList.remove('show');
  if(!username){ err.textContent='⚠ Introduceți un username.'; err.classList.add('show'); return; }
  if(!cnp){ err.textContent='⚠ Introduceți CNP-ul.'; err.classList.add('show'); return; }
  if(password.length<6){ err.textContent='⚠ Parola minim 6 caractere.'; err.classList.add('show'); return; }
  if(password!==password2){ err.textContent='⚠ Parolele nu coincid.'; err.classList.add('show'); return; }
  const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,cnp,password,role:'member',org:'service'})});
  if(res.ok){ ok.classList.add('show'); ['regUser','regCnp','regPass','regPass2'].forEach(id=>document.getElementById(id).value=''); }
  else { err.textContent='⚠ '+(await res.text()||'Eroare.'); err.classList.add('show'); }
}
</script>
</body>
</html>
