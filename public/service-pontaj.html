<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Service Panel — Pontaje</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2477c9; --blue-bright:#4aa3ff; --blue-glow:rgba(36,119,201,.5);
    --dark:#070a0f; --dark2:#0f141b; --dark3:#161d27; --dark4:#1e2731;
    --border:#1f2a36; --border2:#2a3949; --text:#e8eef5; --muted:#6a7584;
    --green:#27ae60; --green-bright:#2ecc71; --green-dim:rgba(39,174,96,0.12);
    --gold:#f1c40f; --gold-dim:rgba(241,196,15,0.12);
    --sb-collapsed:64px; --sb-expanded:220px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Rajdhani',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;
    background-image:linear-gradient(rgba(7,10,15,.85),rgba(7,10,15,.92)),url("https://i.imgur.com/7YqgLz2.jpeg");
    background-size:cover;background-position:center;background-attachment:fixed;
    display:flex;
  }
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-collapsed);background:rgba(15,20,27,.96);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;backdrop-filter:blur(8px)}
  .sidebar:hover{width:var(--sb-expanded)}
  .sb-brand{height:64px;display:flex;align-items:center;padding:0 18px;gap:14px;border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap}
  .sb-brand-icon{font-size:22px;color:var(--blue-bright);text-shadow:0 0 20px var(--blue-glow);width:28px;text-align:center}
  .sb-brand-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--blue-bright);text-shadow:0 0 20px var(--blue-glow);opacity:0;transition:opacity .2s .05s}
  .sidebar:hover .sb-brand-text{opacity:1}
  .sb-nav{flex:1;display:flex;flex-direction:column;padding:10px 0;gap:2px;overflow:hidden}
  .sb-link{display:flex;align-items:center;gap:14px;padding:0 18px;height:44px;text-decoration:none;color:var(--muted);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;transition:.15s;border-left:2px solid transparent}
  .sb-link:hover{color:var(--text);background:rgba(255,255,255,.04)}
  .sb-link.active{color:var(--text);background:rgba(36,119,201,.12);border-left-color:var(--blue-bright)}
  .sb-icon{font-size:18px;width:28px;text-align:center}
  .sb-label{opacity:0;transition:opacity .18s .06s}
  .sidebar:hover .sb-label{opacity:1}
  .sb-bottom{border-top:1px solid var(--border);padding:12px 0;display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .sb-user{display:flex;align-items:center;gap:14px;padding:6px 18px;white-space:nowrap;overflow:hidden}
  .sb-user-icon{font-size:16px;width:28px;text-align:center;color:var(--muted)}
  .sb-user-info{display:flex;flex-direction:column;gap:1px;opacity:0;transition:opacity .18s .06s}
  .sidebar:hover .sb-user-info{opacity:1}
  .sb-user-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .sb-username{font-weight:700;font-size:14px;color:var(--text);max-width:130px;overflow:hidden;text-overflow:ellipsis}
  .sb-logout{display:flex;align-items:center;gap:14px;padding:0 18px;height:40px;background:transparent;color:var(--blue-bright);border:none;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;width:100%;text-align:left;font-family:'Rajdhani',sans-serif}
  .sb-logout:hover{background:rgba(36,119,201,.18);color:#fff}
  .sb-logout-icon{font-size:16px;width:28px;text-align:center}
  .sb-logout-label{opacity:0;transition:opacity .18s .06s}
  .sidebar:hover .sb-logout-label{opacity:1}

  .main-content{margin-left:var(--sb-collapsed);flex:1;min-width:0;}

  .page-header{padding:48px 36px 24px;display:flex;align-items:flex-end;justify-content:space-between;}
  .page-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--blue-bright);}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:6px;line-height:1;}
  .page-sub{font-size:13px;color:var(--muted);letter-spacing:.5px;margin-top:4px;}
  .btn-save{font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;background:var(--blue);color:#fff;border:none;padding:12px 28px;border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:.2s}
  .btn-save:hover{background:var(--blue-bright);box-shadow:0 0 20px var(--blue-glow);transform:translateY(-1px)}

  /* ── PODIUM ── */
  .podium-wrap{margin:0 36px 32px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .podium-card{background:rgba(15,20,27,.85);border:1px solid var(--border2);border-radius:4px;padding:18px 14px;text-align:center;backdrop-filter:blur(6px);transition:all .2s;}
  .podium-card.rank-1{border-color:var(--gold);box-shadow:0 0 20px rgba(241,196,15,.15);}
  .podium-card.rank-2{border-color:#aaa;box-shadow:0 0 16px rgba(170,170,170,.1);}
  .podium-card.rank-3{border-color:#cd7f32;box-shadow:0 0 16px rgba(205,127,50,.1);}
  .podium-rank{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;}
  .rank-1 .podium-rank{color:var(--gold);}
  .rank-2 .podium-rank{color:#bbb;}
  .rank-3 .podium-rank{color:#cd7f32;}
  .rank-4 .podium-rank,.rank-5 .podium-rank{color:var(--blue-bright);}
  .podium-name{font-weight:700;font-size:14px;letter-spacing:.5px;margin:6px 0 2px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .podium-hours{font-size:12px;color:var(--muted);letter-spacing:1px;}
  .podium-bonus{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-top:6px;}
  .podium-empty{color:var(--muted);font-size:13px;padding:12px 0;}

  /* ── TABLE ── */
  .table-wrap{margin:0 36px 48px;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:rgba(15,20,27,.85);backdrop-filter:blur(6px)}
  .table-wrap table{width:100%;border-collapse:collapse}
  .table-wrap thead tr{background:var(--dark3);border-bottom:1px solid var(--border2)}
  .table-wrap th{font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:14px 16px;text-align:left}
  .table-wrap th:first-child{padding-left:20px}
  .table-wrap tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
  .table-wrap tbody tr:last-child{border-bottom:none}
  .table-wrap tbody tr:hover{background:rgba(255,255,255,.025)}
  .row-num{font-size:11px;color:var(--muted);font-weight:600;padding:10px 8px 10px 20px!important;width:36px}
  .table-wrap td{padding:8px 16px;vertical-align:middle}
  .table-wrap input{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:500;background:transparent;color:var(--text);border:1px solid transparent;border-radius:3px;padding:6px 10px;width:100%;outline:none;transition:.15s}
  .table-wrap input:focus{background:var(--dark4);border-color:var(--border2)}
  .table-wrap input:hover{background:var(--dark3);border-color:var(--border)}
  .cell-text{font-size:14px;font-weight:500;color:var(--text);padding:6px 10px;display:block}
  .cell-text.muted{color:var(--muted)}
  .salary-cell{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;}
  .salary-ok{color:var(--green-bright);}
  .salary-no{color:var(--muted);}
  .bonus-cell{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--gold);}
  .total-cell{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--blue-bright);}
  .section-label{padding:0 36px;margin:8px 0 16px;display:flex;align-items:center;gap:16px}
  .section-label span{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

  .toast{position:fixed;bottom:28px;right:28px;background:var(--dark3);border:1px solid var(--blue);color:#fff;font-weight:600;font-size:14px;letter-spacing:1px;padding:14px 24px;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px var(--blue-glow);transform:translateY(80px);opacity:0;transition:.3s;z-index:999}
  .toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">
    <span class="sb-brand-icon">⚙</span>
    <span class="sb-brand-text">SERVICE</span>
  </div>
  <nav class="sb-nav">
    <a href="/service-panel"   class="sb-link"><span class="sb-icon">🏠</span><span class="sb-label">Home</span></a>
    <a href="/service-pontaj"  class="sb-link active"><span class="sb-icon">💰</span><span class="sb-label">Pontaje</span></a>
    <a href="/service-invoiri" class="sb-link"><span class="sb-icon">📅</span><span class="sb-label">Învoiri</span></a>
    <a href="/service-admin"   class="sb-link" id="adminLink" style="display:none"><span class="sb-icon">🛡</span><span class="sb-label">Admin</span></a>
  </nav>
  <div class="sb-bottom">
    <div class="sb-user">
      <span class="sb-user-icon">👤</span>
      <div class="sb-user-info">
        <span class="sb-user-label">Conectat ca</span>
        <span class="sb-username" id="navUsername">—</span>
      </div>
    </div>
    <button class="sb-logout" onclick="logout()">
      <span class="sb-logout-icon">⏻</span>
      <span class="sb-logout-label">Logout</span>
    </button>
  </div>
</aside>

<div class="main-content">

  <div class="page-header">
    <div>
      <div class="page-label">Service</div>
      <div class="page-title">💰 Pontaje</div>
      <div class="page-sub">Orele introduse se calculează automat — salariu + bonusuri de clasament.</div>
    </div>
    <button class="btn-save" id="saveBtn" onclick="save()">💾 Salvează</button>
  </div>

  <!-- PODIUM TOP 5 -->
  <div class="section-label"><span>🏆 Top 5 Ore</span></div>
  <div class="podium-wrap" id="podiumWrap"></div>

  <!-- TABLE -->
  <div class="section-label"><span>📋 Toți Membrii</span></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nume</th>
          <th>Grad</th>
          <th>Ore Pontaj</th>
          <th>Salariu</th>
          <th>Bonus Clasament</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast">✓ Date salvate</div>

<script>
let user;
let serviceData = [];

const SALARY     = 500000;
const BONUSES    = [1000000, 800000, 600000, 400000, 200000];
const BONUS_LABELS = ["🥇 Locul 1","🥈 Locul 2","🥉 Locul 3","🏅 Locul 4","🏅 Locul 5"];
const RANK_EMOJIS = ["🥇","🥈","🥉","🏅","🏅"];

function fmt(n){ return n.toLocaleString('ro-RO') + "$"; }

function calcSalaries(data){
  // Only members with name
  const active = data.filter(d => d.nume && d.nume.trim() !== "");
  // Sort by hours desc for ranking
  const sorted = [...active].sort((a,b) => (parseFloat(b.ore)||0) - (parseFloat(a.ore)||0));

  // Assign rank bonus (only if > 0 hours and qualifies)
  const rankMap = {};
  let rankIdx = 0;
  for(let i=0; i<sorted.length && rankIdx<5; i++){
    const ore = parseFloat(sorted[i].ore)||0;
    if(ore > 0){
      rankMap[sorted[i].nume] = rankIdx;
      rankIdx++;
    }
  }

  return active.map(d => {
    const ore   = parseFloat(d.ore)||0;
    const sal   = ore > 15 ? SALARY : 0;
    const rank  = rankMap[d.nume] !== undefined ? rankMap[d.nume] : -1;
    const bonus = rank >= 0 ? BONUSES[rank] : 0;
    const total = sal + bonus;
    return { ...d, ore, sal, bonus, rank, total };
  });
}

function renderPodium(results){
  const top5 = results
    .filter(r => r.rank >= 0)
    .sort((a,b) => a.rank - b.rank)
    .slice(0,5);

  const wrap = document.getElementById("podiumWrap");
  if(!top5.length){
    wrap.innerHTML = `<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px 0">Nicio persoană cu ore introduse.</div>`;
    return;
  }

  wrap.innerHTML = top5.map((r,i) => `
    <div class="podium-card rank-${i+1}">
      <div class="podium-rank">${RANK_EMOJIS[i]} #${i+1}</div>
      <div class="podium-name">${r.nume}</div>
      <div class="podium-hours">${r.ore} ore</div>
      <div class="podium-bonus">${fmt(BONUSES[i])}</div>
    </div>
  `).join("");
}

function renderTable(results, isLeader){
  const tbody = document.getElementById("tableBody");
  if(!results.length){
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Niciun membru în evidență.</td></tr>`;
    return;
  }

  tbody.innerHTML = results.map((r,i) => {
    const salClass = r.sal > 0 ? "salary-ok" : "salary-no";
    const bonusStr = r.bonus > 0 ? `<span class="bonus-cell">${BONUS_LABELS[r.rank]} · ${fmt(r.bonus)}</span>` : `<span style="color:var(--muted)">—</span>`;
    const totalStr = r.total > 0 ? `<span class="total-cell">${fmt(r.total)}</span>` : `<span style="color:var(--muted)">0$</span>`;
    const oreCell = isLeader
      ? `<input type="number" min="0" max="168" value="${r.ore||""}" placeholder="0" onchange="onOreChange()">`
      : `<span class="cell-text ${r.ore?"":"muted"}">${r.ore||"—"}</span>`;

    return `<tr>
      <td class="row-num">${i+1}</td>
      <td><span class="cell-text">${r.nume}</span></td>
      <td><span class="cell-text muted">${r.grad||"—"}</span></td>
      <td>${oreCell}</td>
      <td><span class="salary-cell ${salClass}">${r.sal > 0 ? fmt(r.sal) : "—"}</span></td>
      <td>${bonusStr}</td>
      <td>${totalStr}</td>
    </tr>`;
  }).join("");
}

function onOreChange(){
  // Re-read hours from inputs and recalculate live
  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach((row, i) => {
    const input = row.querySelector("input[type='number']");
    if(input && serviceData[i]) serviceData[i].ore = parseFloat(input.value)||0;
  });
  const results = calcSalaries(serviceData);
  renderPodium(results);
  // Re-render salary/bonus/total cells only
  const tbody = document.getElementById("tableBody");
  const trows = tbody.querySelectorAll("tr");
  trows.forEach((row, i) => {
    const r = results[i];
    if(!r) return;
    const cells = row.querySelectorAll("td");
    const salClass = r.sal > 0 ? "salary-ok" : "salary-no";
    cells[4].innerHTML = `<span class="salary-cell ${salClass}">${r.sal > 0 ? fmt(r.sal) : "—"}</span>`;
    cells[5].innerHTML = r.bonus > 0
      ? `<span class="bonus-cell">${BONUS_LABELS[r.rank]} · ${fmt(r.bonus)}</span>`
      : `<span style="color:var(--muted)">—</span>`;
    cells[6].innerHTML = r.total > 0
      ? `<span class="total-cell">${fmt(r.total)}</span>`
      : `<span style="color:var(--muted)">0$</span>`;
  });
}

async function init(){
  const res = await fetch("/me");
  user = await res.json();
  if(!user){ location.href="/service-login"; return; }
  document.getElementById("navUsername").textContent = user.username;
  if(user.role && user.role.toLowerCase()==="leader"){
    const al = document.getElementById("adminLink");
    if(al) al.style.display = "";
  }
  if(user.role !== "leader") document.getElementById("saveBtn").style.display = "none";
  load();
}

async function load(){
  const res = await fetch("/service");
  const raw = await res.json();
  // Only rows with a name
  serviceData = raw.filter(d => d.nume && d.nume.trim() !== "").map(d => ({
    ...d,
    ore: parseFloat(d.pontaj)||0
  }));
  const results = calcSalaries(serviceData);
  renderPodium(results);
  renderTable(results, user.role === "leader");
}

async function save(){
  // Collect hours from inputs
  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach((row, i) => {
    const input = row.querySelector("input[type='number']");
    if(input && serviceData[i]) serviceData[i].ore = parseFloat(input.value)||0;
  });

  // Save pontaj back to /service-pontaj endpoint
  const payload = serviceData.map(d => ({ nume: d.nume, ore: d.ore }));
  const res = await fetch("/service-pontaj", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  if(res.ok){
    const t = document.getElementById("toast");
    t.textContent = "✓ Pontaj salvat";
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 3000);
    load();
  }
}

async function logout(){
  await fetch("/logout",{method:"POST"}).catch(()=>{});
  location.href="/service-login";
}

init();
</script>
</body>
</html>
