<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Bratva Panel — Sputnik</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-glow: rgba(192,57,43,0.5);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --muted: #666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
  }

  /* ── SIDEBAR ── */
  :root { --sb-collapsed: 64px; --sb-expanded: 220px; }
  body { display: flex; min-height: 100vh; }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sb-collapsed);
    background: var(--dark2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transition: width 0.28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: -1px; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.28s;
  }
  .sidebar:hover { width: var(--sb-expanded); }
  .sidebar:hover::after { opacity: 1; }

  .sb-brand {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .sb-brand-icon {
    font-size: 22px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .sb-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    opacity: 0;
    transition: opacity 0.2s 0.05s;
  }
  .sidebar:hover .sb-brand-text { opacity: 1; }

  .sb-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    gap: 2px;
    overflow: hidden;
  }
  .sb-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 44px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
  }
  .sb-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .sb-link.active {
    color: var(--text);
    background: rgba(192,57,43,0.1);
    border-left-color: var(--red-bright);
  }
  .sb-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; line-height: 1; }
  .sb-label { opacity: 0; transition: opacity 0.18s 0.06s; }
  .sidebar:hover .sb-label { opacity: 1; }

  .sb-bottom {
    border-top: 1px solid var(--border);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sb-user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 18px;
    white-space: nowrap;
    overflow: hidden;
  }
  .sb-user-icon { font-size: 16px; flex-shrink: 0; width: 28px; text-align: center; color: var(--muted); }
  .sb-user-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    opacity: 0;
    transition: opacity 0.18s 0.06s;
    min-width: 0;
  }
  .sidebar:hover .sb-user-info { opacity: 1; }
  .sb-user-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .sb-username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .sb-logout {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 40px;
    background: transparent;
    color: var(--red-bright);
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sb-logout:hover { background: rgba(192,57,43,0.15); color: white; }
  .sb-logout-icon { font-size: 16px; flex-shrink: 0; width: 28px; text-align: center; }
  .sb-logout-label { opacity: 0; transition: opacity 0.18s 0.06s; }
  .sidebar:hover .sb-logout-label { opacity: 1; }

  .main-content {
    margin-left: var(--sb-collapsed);
    flex: 1;
    min-width: 0;
    transition: margin-left 0.28s cubic-bezier(.4,0,.2,1);
  }

  /* ── PAGE HEADER ── */
  .page-header { padding: 40px 36px 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  .page-header-left { display: flex; flex-direction: column; gap: 4px; }
  .page-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--red-bright); }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 6px; line-height: 1; }
  .page-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-top: 4px; }

  /* ── PAGE TABS (Pagina 1 / Pagina 2) ── */
  .page-tabs {
    display: flex;
    gap: 8px;
    padding: 0 36px 24px;
  }
  .page-tab {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 9px 20px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    color: var(--muted);
    background: var(--dark3);
    transition: all 0.15s;
  }
  .page-tab:hover { color: var(--text); border-color: #444; }
  .page-tab.active {
    background: rgba(192,57,43,0.18);
    border-color: var(--red);
    color: var(--red-bright);
  }

  .btn-save {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; background: var(--red); color: white; border: none;
    padding: 12px 28px; border-radius: 3px; cursor: pointer; transition: all 0.2s ease;
  }
  .btn-save:hover { background: var(--red-bright); box-shadow: 0 0 20px var(--red-glow); transform: translateY(-1px); }

  /* ── TABLE ── */
  .table-wrap { margin: 0 36px 48px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--dark2); }
  .table-wrap table { width: 100%; border-collapse: collapse; }
  .table-wrap thead tr { background: var(--dark3); border-bottom: 1px solid var(--border2); }
  .table-wrap th {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    padding: 14px 16px; text-align: left; white-space: nowrap;
  }
  .table-wrap th:first-child { padding-left: 20px; }
  .table-wrap tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .table-wrap tbody tr:last-child { border-bottom: none; }
  .table-wrap tbody tr:hover { background: rgba(255,255,255,0.025); }
  .row-num { font-size: 11px; color: var(--muted); font-weight: 600; padding: 10px 8px 10px 20px !important; width: 36px; }
  .table-wrap td { padding: 8px 16px; vertical-align: middle; }
  .table-wrap input, .table-wrap select {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 500;
    background: transparent; color: var(--text); border: 1px solid transparent;
    border-radius: 3px; padding: 6px 10px; width: 100%; transition: all 0.15s; outline: none;
  }
  .table-wrap input:focus, .table-wrap select:focus { background: var(--dark4); border-color: var(--border2); }
  .table-wrap input:hover, .table-wrap select:hover { background: var(--dark3); border-color: var(--border); }

  .grade-select { font-weight: 700 !important; font-size: 12px !important; letter-spacing: 1px; text-transform: uppercase; color: var(--red-bright) !important; cursor: pointer; }

  select.color-select { font-weight: 700 !important; font-size: 13px !important; text-align: center; cursor: pointer; transition: background 0.2s, border-color 0.2s !important; }
  select.color-select.is-da { background: rgba(39,174,96,0.18) !important; border-color: #27ae60 !important; color: #2ecc71 !important; }
  select.color-select.is-nu { background: rgba(192,57,43,0.18) !important; border-color: var(--red) !important; color: var(--red-bright) !important; }
  select.color-select.is-da:hover, select.color-select.is-da:focus { background: rgba(39,174,96,0.28) !important; }
  select.color-select.is-nu:hover, select.color-select.is-nu:focus { background: rgba(192,57,43,0.28) !important; }

  /* Read-only cells */
  .cell-text { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); padding: 6px 10px; display: block; user-select: none; }
  .cell-text.muted { color: var(--muted); }
  .grade-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--red-bright); padding: 6px 10px; display: block; user-select: none; }
  .danu-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; padding: 6px 10px; display: block; user-select: none; text-align: center; }
  .danu-text.is-da { color: #2ecc71; }
  .danu-text.is-nu { color: var(--red-bright); }

  /* ── PAGE BADGE ── */
  .page-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
    background: rgba(192,57,43,0.15);
    border: 1px solid var(--red);
    color: var(--red-bright);
    padding: 4px 10px;
    border-radius: 2px;
    margin-left: 10px;
    vertical-align: middle;
  }

  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--dark3); border: 1px solid var(--red); color: white;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px;
    padding: 14px 24px; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px var(--red-glow);
    transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-brand">
    <span class="sb-brand-icon">☭</span>
    <span class="sb-brand-text">BRATVA</span>
  </div>
  <nav class="sb-nav">
    <a href="/dashboard"  class="sb-link"><span class="sb-icon">🏠</span><span class="sb-label">Home</span></a>
    <a href="/bratva-panel"     class="sb-link"><span class="sb-icon">🔱</span><span class="sb-label">Bratva</span></a>
    <a href="/sputnik-panel"    class="sb-link active"><span class="sb-icon">⚡</span><span class="sb-label">Sputnik</span></a>
    <a href="/task"       class="sb-link"><span class="sb-icon">📋</span><span class="sb-label">Task</span></a>
    <a href="/calculator" class="sb-link"><span class="sb-icon">💰</span><span class="sb-label">Calculator</span></a>
    <a href="/invoiri-panel"    class="sb-link"><span class="sb-icon">📅</span><span class="sb-label">Învoiri</span></a>
    <a href="/amenzi" class="sb-link"><span class="sb-icon">⚠️</span><span class="sb-label">Amenzi</span></a>
    <a href="/admin"      class="sb-link" id="adminLink" style="display:none"><span class="sb-icon">🛡</span><span class="sb-label">Admin</span></a>
  </nav>
  <div class="sb-bottom">
    <div class="sb-user">
      <span class="sb-user-icon">👤</span>
      <div class="sb-user-info">
        <span class="sb-user-label">Conectat ca</span>
        <span class="sb-username" id="navUsername">—</span>
      </div>
    </div>
    <button class="sb-logout" onclick="logout()">
      <span class="sb-logout-icon">⏻</span>
      <span class="sb-logout-label">Logout</span>
    </button>
  </div>
</aside>

<div class="main-content">

  <div class="page-header">
    <div class="page-header-left">
      <div class="page-label">Organizație</div>
      <div class="page-title">⚡ Sputnik <span class="page-badge">Pagina 2</span></div>
      <div class="page-sub" id="pageSub">Evidența prezenței, taskurilor și învoirilor membrilor Sputnik.</div>
    </div>
    <button class="btn-save" id="saveBtn" onclick="save()">💾 Salvează</button>
  </div>

  <!-- PAGE TABS -->
  <div class="page-tabs" id="pageTabs">
    <!-- loaded dynamically -->
  </div>
  <div id="createPageBar" style="display:none;padding:0 36px 18px;">
    <button class="btn-save" style="background:var(--dark3);border:1px solid var(--border2);color:var(--muted);font-size:11px;padding:8px 18px;" onclick="createPage()">✚ Adaugă Pagină Sputnik</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nume</th>
          <th>CNP</th>
          <th>Telefon</th>
          <th>Grad</th>
          <th>Task Săptămânal</th>
          <th>Task Avansări</th>
          <th>Învoire</th>
          <th>Prezență</th>
          <th style="text-align:center">Amendă</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast">✓ Date salvate cu succes</div>

<script>
let user;
let PAGE_NUM = 1;
const grades = ["Knyaz","Polkovnik","Shestyorka","Svyaznoi","Krysha"];

function applyColor(sel){
  sel.classList.remove("is-da","is-nu");
  if(sel.value === "Da") sel.classList.add("is-da");
  else if(sel.value === "Nu") sel.classList.add("is-nu");
}

async function init(){
  // Get page number from URL
  const urlParts = location.pathname.split("/");
  PAGE_NUM = parseInt(urlParts[urlParts.length-1]) || 3;

  const res = await fetch("/me");
  user = await res.json();
  if(!user){ location.href="/login"; return; }
  document.getElementById("navUsername").textContent = user.username;
  if(user.role && user.role.toLowerCase() === "leader"){
    document.getElementById("adminLink").style.display = "";
    document.getElementById("createPageBar").style.display = "";
  }
  // Update page sub title
  const startPos = (PAGE_NUM-1)*35+1;
  const endPos = startPos+34;
  document.getElementById("pageSub").textContent = `Locurile ${startPos}–${endPos} — evidența prezenței, taskurilor și învoirilor membrilor Sputnik.`;

  await loadPageTabs();
  load();
}

async function loadPageTabs(){
  const res = await fetch("/sputnik-pages");
  const pages = await res.json();
  const container = document.getElementById("pageTabs");
  container.innerHTML = "";
  const startNums = {1:1,2:36};
  pages.forEach((p) => {
    const a = document.createElement("a");
    a.className = "page-tab" + (p.page_num === PAGE_NUM ? " active" : "");
    const start = startNums[p.page_num] || ((p.page_num-1)*35+1);
    const end = start+34;
    const href = p.page_num === 1 ? "/sputnik-panel" : p.page_num === 2 ? "/sputnik2-panel" : `/sputnik-panel/${p.page_num}`;
    a.href = href;
    a.textContent = `⚡ ${p.title} (${start}–${end})`;
    container.appendChild(a);
  });
  if(user && user.role === "leader"){
    pages.filter(p=>p.page_num > 2).forEach(p => {
      const delBtn = document.createElement("button");
      delBtn.textContent = "🗑";
      delBtn.title = `Șterge ${p.title}`;
      delBtn.style.cssText = "background:rgba(192,57,43,0.2);border:1px solid var(--red);color:var(--red-bright);border-radius:3px;padding:6px 10px;cursor:pointer;font-size:13px;margin-left:4px;";
      delBtn.onclick = () => deletePage(p.page_num);
      container.appendChild(delBtn);
    });
  }
}

async function createPage(){
  const title = prompt("Titlu pagina nouă:");
  if(!title) return;
  const res = await fetch("/sputnik-create-page", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title})});
  if(res.ok){
    const data = await res.json();
    showToast(`✓ ${data.title} creată! Redirecționare...`);
    setTimeout(()=>location.href=`/sputnik-panel/${data.page_num}`, 1500);
  } else {
    showToast("❌ Eroare: " + await res.text());
  }
}

async function deletePage(n){
  if(!confirm(`Ești sigur că vrei să ștergi Pagina ${n}? Datele vor fi pierdute!`)) return;
  const res = await fetch(`/sputnik-page/${n}`,{method:"DELETE"});
  if(res.ok){
    showToast("Pagina ștearsă");
    setTimeout(()=>location.href="/sputnik-panel", 1200);
  } else showToast("❌ " + await res.text());
}

function sortByGrade(data){
  return [...data].sort((a,b)=>{
    const hasA = a.nume && a.nume.trim() !== "";
    const hasB = b.nume && b.nume.trim() !== "";
    if(!hasA && !hasB) return 0;
    if(!hasA) return 1;
    if(!hasB) return -1;
    const iA = grades.indexOf(a.grad);
    const iB = grades.indexOf(b.grad);
    return (iA===-1?grades.length:iA) - (iB===-1?grades.length:iB);
  });
}

function collectData(){
  const rows = document.querySelectorAll("#tableBody tr");
  const data = [];
  rows.forEach(r=>{
    const inputs = r.querySelectorAll("input");
    const selects = r.querySelectorAll("select");
    const invoireSpan = r.querySelector("[data-invoire]");
    data.push({
      nume: inputs[0].value, cnp: inputs[1].value, telefon: inputs[2].value,
      grad: selects[0].value, task: selects[1].value, taskAvansari: inputs[3].value,
      invoire: invoireSpan ? invoireSpan.dataset.invoire : "Nu",
      prezenta: selects[2].value
    });
  });
  return data;
}

function createRows(data=[]){
  const tbody = document.getElementById("tableBody");
  let html = "";
  const isLeader = user.role === "leader";
  const filled = data.filter(d => d.nume && d.nume.trim() !== "");
  const empty  = data.filter(d => !d.nume || d.nume.trim() === "");
  const sorted = [...sortByGrade(filled), ...empty];
  while(sorted.length < 35) sorted.push({});
  const startPos = (PAGE_NUM-1)*35+1;

  for(let i=0;i<35;i++){
    const d = sorted[i]||{};
    if(isLeader){
      const daNu = (val) => `
        <select class="color-select">
          <option ${val=="Da"?"selected":""}>Da</option>
          <option ${val=="Nu"?"selected":""}>Nu</option>
        </select>`;
      html += `<tr>
        <td class="row-num">${startPos+i}</td>
        <td><input value="${d.nume||""}" placeholder="—"></td>
        <td><input value="${d.cnp||""}" placeholder="—"></td>
        <td><input value="${d.telefon||""}" placeholder="—"></td>
        <td><select class="grade-select">${grades.map(g=>`<option ${d.grad===g?"selected":""}>${g}</option>`).join("")}</select></td>
        <td>${daNu(d.task)}</td>
        <td><input value="${d.taskAvansari||""}" placeholder="—"></td>
        <td><span class="danu-text ${d.invoire=="Da"?"is-da":"is-nu"}" data-invoire="${d.invoire||"Nu"}">${d.invoire||"Nu"}</span></td>
        <td>${daNu(d.prezenta)}</td>
        <td style="text-align:center">${d.amendaActiva?'⚠️':'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`;
    } else {
      const sv = (v) => `<span class="cell-text ${v?"":"muted"}">${v||"—"}</span>`;
      const dn = (v) => `<span class="danu-text ${v=="Da"?"is-da":v=="Nu"?"is-nu":""}">${v||"—"}</span>`;
      html += `<tr>
        <td class="row-num">${startPos+i}</td>
        <td>${sv(d.nume)}</td>
        <td>${sv(d.cnp)}</td>
        <td>${sv(d.telefon)}</td>
        <td><span class="grade-text">${d.grad||grades[0]}</span></td>
        <td>${dn(d.task)}</td>
        <td>${sv(d.taskAvansari)}</td>
        <td>${dn(d.invoire)}</td>
        <td>${dn(d.prezenta)}</td>
        <td style="text-align:center">${d.amendaActiva?'⚠️':'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`;
    }
  }
  tbody.innerHTML = html;
  if(isLeader){
    document.querySelectorAll("select.color-select").forEach(sel=>{
      applyColor(sel);
      sel.addEventListener("change", ()=>applyColor(sel));
    });
    document.querySelectorAll("select.grade-select").forEach(sel=>{
      sel.addEventListener("change", ()=>{ createRows(collectData()); });
    });
  } else {
    document.getElementById("saveBtn").style.display="none";
  }
}

async function load(){
  const res = await fetch(`/sputnik-data/${PAGE_NUM}`);
  const data = await res.json();
  createRows(data);
}

async function save(){
  await fetch(`/sputnik-data/${PAGE_NUM}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(collectData())});
  showToast();
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg || "✓ Date salvate cu succes";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3000);
}

async function logout(){
  await fetch("/logout",{method:"POST"}).catch(()=>{});
  location.href="/login";
}

init();
</script>
<script src="notifications.js"></script>
</body>
</html>
