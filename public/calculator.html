<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Bratva Panel — Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-glow: rgba(192,57,43,0.5);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --muted: #666;
    --green: #27ae60;
    --green-bright: #2ecc71;
    --green-dim: rgba(39,174,96,0.15);
    --yellow: #f39c12;
    --yellow-dim: rgba(243,156,18,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
  }

  /* ── SIDEBAR ── */
  :root { --sb-collapsed: 64px; --sb-expanded: 220px; }

  body { display: flex; min-height: 100vh; }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sb-collapsed);
    background: var(--dark2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transition: width 0.28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: -1px; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.28s;
  }
  .sidebar:hover { width: var(--sb-expanded); }
  .sidebar:hover::after { opacity: 1; }

  /* Brand */
  .sb-brand {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .sb-brand-icon {
    font-size: 22px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .sb-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    opacity: 0;
    transition: opacity 0.2s 0.05s;
  }
  .sidebar:hover .sb-brand-text { opacity: 1; }

  /* Nav links */
  .sb-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    gap: 2px;
    overflow: hidden;
  }
  .sb-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 44px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .sb-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .sb-link.active {
    color: var(--text);
    background: rgba(192,57,43,0.1);
    border-left-color: var(--red-bright);
  }
  .sb-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    line-height: 1;
  }
  .sb-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-label { opacity: 1; }

  /* Bottom user area */
  .sb-bottom {
    border-top: 1px solid var(--border);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sb-user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 18px;
    white-space: nowrap;
    overflow: hidden;
  }
  .sb-user-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    color: var(--muted);
  }
  .sb-user-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    opacity: 0;
    transition: opacity 0.18s 0.06s;
    min-width: 0;
  }
  .sidebar:hover .sb-user-info { opacity: 1; }
  .sb-user-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sb-username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .sb-logout {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 40px;
    background: transparent;
    color: var(--red-bright);
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sb-logout:hover { background: rgba(192,57,43,0.15); color: white; }
  .sb-logout-icon { font-size: 16px; flex-shrink: 0; width: 28px; text-align: center; }
  .sb-logout-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-logout-label { opacity: 1; }

  /* Main content offset */
  .main-content {
    margin-left: var(--sb-collapsed);
    flex: 1;
    min-width: 0;
    transition: margin-left 0.28s cubic-bezier(.4,0,.2,1);
  }
  /* ── PAGE HEADER ── */
  .page-header { padding: 40px 36px 28px; }
  .page-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--red-bright); margin-bottom: 4px; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 6px; line-height: 1; }
  .page-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-top: 4px; }

  /* ── GRID ── */
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 0 36px 48px;
  }

  /* ── CALC CARD ── */
  .calc-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .calc-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
    transition: background 0.3s;
  }
  .calc-card.gold-glow {
    border-color: #f39c12;
    box-shadow: 0 0 24px rgba(243,156,18,0.25);
  }
  .calc-card.gold-glow::before { background: var(--yellow); }

  .card-header-inner {
    padding: 18px 22px 14px;
    background: var(--dark3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header-inner h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text);
  }
  .card-icon { font-size: 20px; }

  /* ── ITEMS ── */
  .items-list { padding: 16px 22px; display: flex; flex-direction: column; gap: 8px; }

  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .item-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #aaa;
    flex: 1;
  }
  .item-price {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .item-qty {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: var(--dark4);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 5px 8px;
    width: 72px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .item-qty::-webkit-inner-spin-button,
  .item-qty::-webkit-outer-spin-button { -webkit-appearance: none; }
  .item-qty:focus { border-color: var(--red); }

  /* ── RESULTS ── */
  .results-block {
    margin: 0 22px 16px;
    background: var(--dark3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .result-label {
    color: var(--muted);
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .result-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
    transition: color 0.3s;
  }
  .result-val.highlight { color: var(--red-bright); }
  .result-val.val-gold { color: var(--yellow) !important; text-shadow: 0 0 8px rgba(243,156,18,0.4); }

  .result-divider { height: 1px; background: var(--border); margin: 2px 0; }

  .result-row.bonus .result-label { color: var(--green-bright); font-size: 12px; }
  .result-row.bonus .result-val { font-size: 15px; color: var(--green-bright); }

  /* ── RESET BTN ── */
  .btn-reset {
    display: block;
    width: calc(100% - 44px);
    margin: 0 22px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border2);
    padding: 9px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--red-bright); border-color: var(--red); background: rgba(192,57,43,0.08); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--dark3); border: 1px solid var(--red); color: white;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px;
    padding: 14px 24px; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px var(--red-glow);
    transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── FARM CARD ── */
  .farm-card::before { background: #27ae60; }

  .farm-recipe {
    padding: 14px 22px 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .farm-recipe-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 4px;
  }
  .farm-ingredient {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #aaa; font-weight: 600;
  }
  .farm-ingredient .ing-qty {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    color: var(--green-bright); min-width: 24px;
  }
  .farm-ingredient .ing-name { flex: 1; }

  .farm-yield-row {
    margin: 4px 22px 0;
    padding: 10px 14px;
    background: rgba(39,174,96,0.08);
    border: 1px solid rgba(39,174,96,0.25);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: var(--muted);
  }
  .farm-yield-row span { color: var(--green-bright); font-family: 'Bebas Neue', sans-serif; font-size: 20px; }

  .farm-calc {
    margin: 12px 22px 0;
    padding: 14px 16px;
    background: var(--dark3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .farm-calc-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 2px;
  }
  .farm-qty-row {
    display: flex; align-items: center; gap: 10px;
  }
  .farm-qty-label { font-size: 13px; color: #aaa; font-weight: 600; flex: 1; }
  .farm-qty-input {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
    background: var(--dark4); color: var(--text);
    border: 1px solid var(--border2); border-radius: 3px;
    padding: 5px 8px; width: 72px; text-align: center;
    outline: none; -moz-appearance: textfield;
  }
  .farm-qty-input::-webkit-inner-spin-button,
  .farm-qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .farm-qty-input:focus { border-color: var(--green); }

  .farm-result-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
  }
  .farm-result-label { color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .farm-result-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text);
  }
  .farm-result-val.c-green { color: var(--green-bright); }
  .farm-result-val.c-red   { color: var(--red-bright); }

  /* Componente sub-items */
  .comp-item {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 3px; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 8px;
  }
  .comp-item-header {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
  }
  .comp-mats {
    display: flex; gap: 6px;
  }
  .comp-result-row {
    display: flex; justify-content: space-between; font-size: 12px;
    color: var(--muted); font-weight: 600;
    border-top: 1px solid var(--border); padding-top: 6px; margin-top: 2px;
  }
  .comp-result-row span { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--green-bright); }

  /* ── ARME CARD ── */
  .arme-card::before { background: #7f8c8d; }
  .arme-card .card-header-inner h2 { color: var(--text); }

  .arme-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }
  .arme-item-name {
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text); min-width: 90px;
  }
  .arme-res {
    display: flex; gap: 6px; align-items: center; flex: 1;
  }
  .arme-tag {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 7px; border-radius: 2px; border: 1px solid;
    white-space: nowrap;
  }
  .tag-alu  { background: rgba(52,152,219,0.12); border-color: #3498db; color: #5dade2; }
  .tag-fier { background: rgba(149,165,166,0.12); border-color: #7f8c8d; color: #bdc3c7; }
  .tag-val  { background: rgba(243,156,18,0.12);  border-color: var(--yellow); color: var(--yellow); }
  .tag-cash { background: rgba(39,174,96,0.12);   border-color: var(--green); color: var(--green-bright); }

  .arme-qty {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
    background: var(--dark4); color: var(--text);
    border: 1px solid var(--border2); border-radius: 3px;
    padding: 5px 8px; width: 64px; text-align: center;
    outline: none; -moz-appearance: textfield;
  }
  .arme-qty::-webkit-inner-spin-button,
  .arme-qty::-webkit-outer-spin-button { -webkit-appearance: none; }
  .arme-qty:focus { border-color: var(--red); }

  .arme-divider { height: 1px; background: var(--border); margin: 6px 0; }

  .arme-totals {
    margin: 0 22px 16px;
    background: var(--dark3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .arme-total-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .arme-total-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
  .arme-total-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;
  }
  .arme-total-val.c-alu  { color: #5dade2; }
  .arme-total-val.c-fier { color: #bdc3c7; }
  .arme-total-val.c-cash { color: var(--green-bright); }

  .valiza-box {
    margin: 0 22px 12px;
    background: rgba(243,156,18,0.06);
    border: 1px solid rgba(243,156,18,0.3);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 12px; letter-spacing: 0.5px; color: var(--muted); line-height: 1.7;
  }
  .valiza-box strong { color: var(--yellow); }
  .valiza-box span.v-alu { color: #5dade2; font-weight: 700; }
  .valiza-box span.v-fier { color: #bdc3c7; font-weight: 700; }
  .valiza-box span.v-cash { color: var(--green-bright); font-weight: 700; }


  /* ── GLOANE CARD ── */
  .gloane-card::before { background: #e67e22; }
  .gloane-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 22px 20px;
    gap: 20px;
    text-align: center;
  }
  .gloane-recipe-box {
    background: rgba(230,126,34,0.08);
    border: 1px solid rgba(230,126,34,0.3);
    border-radius: 4px;
    padding: 14px 20px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .gloane-recipe-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 4px;
  }
  .gloane-formula {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .gloane-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 1.5px;
    padding: 5px 12px; border-radius: 3px; border: 1px solid;
  }
  .pill-glont { background: rgba(230,126,34,0.15); border-color: #e67e22; color: #e67e22; }
  .pill-cupru { background: rgba(211,84,0,0.15);   border-color: #d35400; color: #e59866; }
  .pill-sulf  { background: rgba(243,156,18,0.12); border-color: #f39c12; color: var(--yellow); }
  .gloane-eq  { color: var(--muted); font-size: 18px; font-weight: 700; }
  .gloane-calc-wrap {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 18px 16px;
    display: flex; flex-direction: column; gap: 14px; align-items: center;
  }
  .gloane-input-row {
    display: flex; align-items: center; gap: 12px; justify-content: center; width: 100%;
  }
  .gloane-input-label {
    font-size: 13px; font-weight: 700; color: #aaa; letter-spacing: 0.5px; flex: 1; text-align: right;
  }
  .gloane-qty {
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
    background: var(--dark4); color: var(--text);
    border: 1px solid var(--border2); border-radius: 3px;
    padding: 7px 10px; width: 90px; text-align: center;
    outline: none; -moz-appearance: textfield; flex-shrink: 0;
  }
  .gloane-qty::-webkit-inner-spin-button,
  .gloane-qty::-webkit-outer-spin-button { -webkit-appearance: none; }
  .gloane-qty:focus { border-color: #e67e22; box-shadow: 0 0 0 1px rgba(230,126,34,0.3); }
  .gloane-results {
    width: 100%;
    display: flex; flex-direction: column; gap: 8px;
  }
  .gloane-result-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .gloane-result-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
  .gloane-result-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px;
  }
  .gval-cupru { color: #e59866; }
  .gval-sulf  { color: var(--yellow); }
  .gval-sets  { color: #aaa; font-size: 16px; }

  /* ── CENTERED ARME+GLOANE ROW ── */
  .arme-gloane-row {
    grid-column: 1 / -1;
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .arme-gloane-row > .calc-card {
    flex: 0 1 480px;
    min-width: 320px;

function fmt(n){ return Math.round(n).toLocaleString("ro-RO"); }

function animateVal(el, end){
  const start = parseInt(el.dataset.raw || "0");
  el.dataset.raw = end;
  if(start === end) return;
  const dur = 280, t0 = performance.now();
  function tick(now){
    let p = Math.min((now - t0) / dur, 1);
    p = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(Math.round(start + (end - start) * p));
    if(p < 1) requestAnimationFrame(tick);
    else el.textContent = fmt(end);
  }
  requestAnimationFrame(tick);
}

function recalcFarm(id, yieldPer, price){
  const sec = SECTIONS.find(s => s.id === id);
  if(!sec) return;
  const batches = parseFloat(document.getElementById("fqty-" + id)?.value) || 0;
  const totalUnits = batches * yieldPer;
  const totalVal   = totalUnits * price;

  sec.recipe.forEach(r => {
    const el = document.getElementById("fing-" + id + "-" + r.name.replace(/\s/g,'_'));
    if(el) el.textContent = (batches * r.qty).toLocaleString("ro-RO");
  });
  const yEl = document.getElementById("fyield-" + id);
  const vEl = document.getElementById("fvalue-" + id);
  if(yEl) yEl.textContent = totalUnits.toLocaleString("ro-RO");
  if(vEl) vEl.textContent = fmt(totalVal) + " $";
}

function recalcComp(id){
  const sec = SECTIONS.find(s => s.id === id);
  if(!sec) return;
  sec.subItems.forEach((item, i) => {
    const qty = parseFloat(document.getElementById("fqty-" + id + "-" + i)?.value) || 0;
    const val  = qty * item.pricePerUnit;
    const alu  = qty * item.alu;
    const fier = qty * item.fier;
    const vEl  = document.getElementById("fval-" + id + "-" + i);
    const mEl  = document.getElementById("fmat-" + id + "-" + i);
    if(vEl) vEl.textContent = fmt(val) + " $";
    if(mEl) mEl.textContent = alu.toLocaleString("ro-RO") + " Alu + " + fier.toLocaleString("ro-RO") + " Fier";
  });
}

function resetFarm(id){
  document.querySelectorAll(`[id^="fqty-${id}"]`).forEach(i => { i.value = 0; });
  const sec = SECTIONS.find(s => s.id === id);
  if(!sec) return;
  if(sec.isComponente) recalcComp(id);
  else recalcFarm(id, sec.yield, sec.pricePerUnit);
}

  const gloane = Math.max(0, parseFloat(document.getElementById("g-gloane")?.value) || 0);
  const sets   = Math.ceil(gloane / 50);
  const cupru  = sets * 4;
  const sulf   = sets * 4;
  const real   = sets * 50;
  const setEl  = document.getElementById("g-sets");
  const cEl    = document.getElementById("g-cupru");
  const sEl    = document.getElementById("g-sulf");
  const rEl    = document.getElementById("g-real");
  if(setEl)  setEl.textContent  = sets.toLocaleString("ro-RO");
  if(cEl)    cEl.textContent    = cupru.toLocaleString("ro-RO");
  if(sEl)    sEl.textContent    = sulf.toLocaleString("ro-RO");
  if(rEl)    rEl.textContent    = real.toLocaleString("ro-RO") + " gloane";
}

function resetGloane(){
  const el = document.getElementById("g-gloane");
  if(el) el.value = 0;
  recalcGloane();
}

function recalc(id){
  const inputs = document.querySelectorAll(`[id^="qty-${id}-"]`);
  let total = 0;
  inputs.forEach(inp => {
    total += (parseFloat(inp.value) || 0) * parseFloat(inp.dataset.price);
  });
  total = Math.round(total);

  const card = document.getElementById("card-" + id);
  const totalEl = document.getElementById("total-" + id);
  const taxaEl  = document.getElementById("taxa-" + id);
  const b25El   = document.getElementById("b25-" + id);
  const b20El   = document.getElementById("b20-" + id);

  animateVal(totalEl, total);
  animateVal(taxaEl,  Math.round(total * 0.10));
  animateVal(b25El,   Math.round(total * 1.25));
  animateVal(b20El,   Math.round(total * 1.20));

  // Gold glow when total >= 1.000.000
  if(total >= 1000000){
    card.classList.add("gold-glow");
    totalEl.classList.add("val-gold");
  } else {
    card.classList.remove("gold-glow");
    totalEl.classList.remove("val-gold");
  }
}

function resetCard(id){
  document.querySelectorAll(`[id^="qty-${id}-"]`).forEach(i => i.value = 0);
  const sec = SECTIONS.find(s => s.id === id);
  if(sec && sec.isArme) recalcArme(id);
  else recalc(id);
}

function recalcArme(id){
  const sec = SECTIONS.find(s => s.id === id);
  if(!sec) return;

  let totAlu = 0, totFier = 0, totVal = 0;

  sec.items.forEach((item, i) => {
    const qty = parseFloat(document.getElementById(`qty-${id}-${i}`)?.value) || 0;
    const alu  = qty * item.alu;
    const fier = qty * item.fier;
    const val  = qty; // 1 valiță per armă

    document.getElementById(`r-alu-${id}-${i}`).textContent  = Math.round(alu).toLocaleString("ro-RO");
    document.getElementById(`r-fier-${id}-${i}`).textContent = Math.round(fier).toLocaleString("ro-RO");
    document.getElementById(`r-val-${id}-${i}`).textContent  = Math.round(val).toLocaleString("ro-RO");

    totAlu  += alu;
    totFier += fier;
    totVal  += val;
  });

  // Valiza cost variants
  const cashTotal   = totVal * 100000;
  const matAlu      = totVal * 30;
  const matFier     = totVal * 30;

  animateVal(document.getElementById(`tot-alu-${id}`),  Math.round(totAlu));
  animateVal(document.getElementById(`tot-fier-${id}`), Math.round(totFier));
  animateVal(document.getElementById(`tot-val-${id}`),  Math.round(totVal));
  animateVal(document.getElementById(`tot-cash-${id}`), Math.round(cashTotal));
  document.getElementById(`tot-matval-${id}`).textContent =
    `${Math.round(matAlu).toLocaleString("ro-RO")} Alu + ${Math.round(matFier).toLocaleString("ro-RO")} Fier`;
}

// Build all cards
async function init(){
  // Auth check — redirect to login if not logged in
  const res = await fetch("/me");
  const user = await res.json();
  // Calculator is accessible to everyone, but navbar needs user info
  if(user){
    document.getElementById("navUsername").textContent = user.username;
    if(user.role && user.role.toLowerCase() === "leader"){
      document.getElementById("adminLink").style.display = "";
    }
  } else {
    document.getElementById("navUsername").textContent = "Vizitator";
  }

  const grid = document.getElementById("calcGrid");

  // Pre-create the arme+gloane header and centered row wrapper
  const armeHeader = document.createElement("div");
  armeHeader.style.cssText = "grid-column:1/-1;display:flex;align-items:flex-end;padding:16px 0 4px;border-top:1px solid var(--border);margin-top:8px;";
  armeHeader.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px;">
    <div style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#7f8c8d;">Utilitar</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:6px;line-height:1;color:var(--text);">🔫 Calculator Arme &amp; Gloante</div>
    <div style="font-size:13px;color:var(--muted);letter-spacing:0.5px;margin-top:2px;">Calculează materialele și valiza necesare pentru craftat arme și gloante.</div>
  </div>`;

  const armeGloaneRow = document.createElement("div");
  armeGloaneRow.className = "arme-gloane-row";

  let farmHeaderAdded = false;
  let armeRowAdded = false;

  SECTIONS.forEach(sec => {
    // ── Normal drug/tax cards ──
    if(!sec.isArme && !sec.isGloane && !sec.isFarm){
      grid.appendChild(buildCard(sec));
      return;
    }

    // ── Arme & Gloane section ──
    if(sec.isArme || sec.isGloane){
      if(!armeRowAdded){
        armeRowAdded = true;
        grid.appendChild(armeHeader);
        grid.appendChild(armeGloaneRow);
      }
      if(sec.isArme) armeGloaneRow.appendChild(buildCard(sec));
      else           armeGloaneRow.appendChild(buildGloaneCard(sec));
      return;
    }

    // ── Farm section ──
    if(sec.isFarm){
      if(!farmHeaderAdded){
        farmHeaderAdded = true;
        const farmDiv = document.createElement("div");
        farmDiv.style.cssText = "grid-column:1/-1;display:flex;align-items:flex-end;padding:16px 0 4px;border-top:1px solid var(--border);margin-top:8px;";
        farmDiv.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px;">
          <div style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#27ae60;">Utilitar</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:6px;line-height:1;color:var(--text);">🌾 Calculator Farm</div>
          <div style="font-size:13px;color:var(--muted);letter-spacing:0.5px;margin-top:2px;">Calculează ingredientele și valoarea produselor farm.</div>
        </div>`;
        grid.appendChild(farmDiv);
      }
      grid.appendChild(buildFarmCard(sec));
    }
  });
}

async function logout(){
  await fetch("/logout", { method: "POST" }).catch(()=>{});
  location.href="/login";
}

init();
</script>
<script src="notifications.js"></script>
