<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Bratva Panel — Bratva</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-glow: rgba(192,57,43,0.5);
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --dark4: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
  }

  /* ── SIDEBAR ── */
  :root { --sb-collapsed: 64px; --sb-expanded: 220px; }

  body { display: flex; min-height: 100vh; }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sb-collapsed);
    background: var(--dark2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 200;
    transition: width 0.28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: -1px; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.28s;
  }
  .sidebar:hover { width: var(--sb-expanded); }
  .sidebar:hover::after { opacity: 1; }

  /* Brand */
  .sb-brand {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .sb-brand-icon {
    font-size: 22px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .sb-brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    opacity: 0;
    transition: opacity 0.2s 0.05s;
  }
  .sidebar:hover .sb-brand-text { opacity: 1; }

  /* Nav links */
  .sb-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    gap: 2px;
    overflow: hidden;
  }
  .sb-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 44px;
    text-decoration: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .sb-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .sb-link.active {
    color: var(--text);
    background: rgba(192,57,43,0.1);
    border-left-color: var(--red-bright);
  }
  .sb-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    line-height: 1;
  }
  .sb-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-label { opacity: 1; }

  /* Bottom user area */
  .sb-bottom {
    border-top: 1px solid var(--border);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sb-user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 18px;
    white-space: nowrap;
    overflow: hidden;
  }
  .sb-user-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
    color: var(--muted);
  }
  .sb-user-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    opacity: 0;
    transition: opacity 0.18s 0.06s;
    min-width: 0;
  }
  .sidebar:hover .sb-user-info { opacity: 1; }
  .sb-user-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sb-username {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .sb-logout {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    height: 40px;
    background: transparent;
    color: var(--red-bright);
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sb-logout:hover { background: rgba(192,57,43,0.15); color: white; }
  .sb-logout-icon { font-size: 16px; flex-shrink: 0; width: 28px; text-align: center; }
  .sb-logout-label {
    opacity: 0;
    transition: opacity 0.18s 0.06s;
  }
  .sidebar:hover .sb-logout-label { opacity: 1; }

  /* Main content offset */
  .main-content {
    margin-left: var(--sb-collapsed);
    flex: 1;
    min-width: 0;
    transition: margin-left 0.28s cubic-bezier(.4,0,.2,1);
  }
  /* ── PAGE HEADER ── */
  .page-header {
    padding: 40px 36px 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .page-header-left { display: flex; flex-direction: column; gap: 4px; }
  .page-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red-bright);
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    letter-spacing: 6px;
    line-height: 1;
  }
  .page-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-top: 4px; }

  .btn-save {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--red);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-save:hover {
    background: var(--red-bright);
    box-shadow: 0 0 20px var(--red-glow);
    transform: translateY(-1px);
  }
  .btn-save:active { transform: translateY(0); }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    margin: 0 36px 48px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--dark2);
  }

  .table-wrap table {
    width: 100%;
    border-collapse: collapse;
  }

  .table-wrap thead tr {
    background: var(--dark3);
    border-bottom: 1px solid var(--border2);
  }

  .table-wrap th {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 16px;
    text-align: left;
    white-space: nowrap;
  }

  .table-wrap th:first-child { padding-left: 20px; }

  .table-wrap tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .table-wrap tbody tr:last-child { border-bottom: none; }
  .table-wrap tbody tr:hover { background: rgba(255,255,255,0.025); }

  .row-num {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    padding: 10px 8px 10px 20px !important;
    width: 36px;
  }

  .table-wrap td {
    padding: 8px 16px;
    vertical-align: middle;
  }

  .table-wrap input[type="text"],
  .table-wrap input:not([type]),
  .table-wrap select {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    background: transparent;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 3px;
    padding: 6px 10px;
    width: 100%;
    transition: all 0.15s;
    outline: none;
  }
  .table-wrap input[type="text"]:focus,
  .table-wrap input:not([type]):focus,
  .table-wrap select:focus {
    background: var(--dark4);
    border-color: var(--border2);
  }
  .table-wrap input:hover,
  .table-wrap select:hover {
    background: var(--dark3);
    border-color: var(--border);
  }

  /* Checkbox styling */
  .checkbox-cell { text-align: center; }
  .check-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--dark3);
    position: relative;
  }
  .check-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    margin: 0;
  }
  .check-icon {
    font-size: 16px;
    line-height: 1;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .check-wrap.checked {
    background: rgba(192,57,43,0.2);
    border-color: var(--red);
  }
  .check-wrap:hover { border-color: var(--red); }

  /* Grade badge */
  .grade-select {
    font-family: 'Rajdhani', sans-serif !important;
    font-weight: 700 !important;
    font-size: 12px !important;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--red-bright) !important;
    cursor: pointer;
  }

  /* Read-only cell */
  .cell-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    padding: 6px 10px;
    display: block;
    user-select: none;
  }
  .cell-text.muted { color: var(--muted); }
  .check-static {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: var(--dark3);
    font-size: 16px;
    pointer-events: none;
    user-select: none;
  }
  .check-static.checked {
    background: rgba(192,57,43,0.2);
    border-color: var(--red);
  }
  .grade-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--red-bright);
    padding: 6px 10px;
    display: block;
    user-select: none;
  }

  /* Read-only cell */
  .cell-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    padding: 6px 10px;
    display: block;
    user-select: none;
  }
  .cell-text.muted { color: var(--muted); }
  .check-static {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: var(--dark3);
    font-size: 16px;
    pointer-events: none;
    user-select: none;
  }
  .check-static.checked { background: rgba(192,57,43,0.2); border-color: var(--red); }
  .grade-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 12px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--red-bright);
    padding: 6px 10px; display: block; user-select: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--dark3);
    border: 1px solid var(--red);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 14px 24px;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px var(--red-glow);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-brand">
    <span class="sb-brand-icon">☭</span>
    <span class="sb-brand-text">BRATVA</span>
  </div>

  <nav class="sb-nav">
    <a href="dashboard.html"  class="sb-link "><span class="sb-icon">🏠</span><span class="sb-label">Home</span></a>
    <a href="bratva.html"     class="sb-link active">   <span class="sb-icon">🔱</span><span class="sb-label">Bratva</span></a>
    <a href="sputnik.html"    class="sb-link ">  <span class="sb-icon">⚡</span><span class="sb-label">Sputnik</span></a>
    <a href="task.html"       class="sb-link ">     <span class="sb-icon">📋</span><span class="sb-label">Task</span></a>
    <a href="calculator.html" class="sb-link ">     <span class="sb-icon">💰</span><span class="sb-label">Calculator</span></a>
    <a href="invoiri.html"   class="sb-link"><span class="sb-icon">📅</span><span class="sb-label">Învoiri</span></a>
    <a href="admin.html"      class="sb-link " id="adminLink" style="display:none"><span class="sb-icon">🛡</span><span class="sb-label">Admin</span></a>
  </nav>

  <div class="sb-bottom">
    <div class="sb-user">
      <span class="sb-user-icon">👤</span>
      <div class="sb-user-info">
        <span class="sb-user-label">Conectat ca</span>
        <span class="sb-username" id="navUsername">—</span>
      </div>
    </div>
    <button class="sb-logout" onclick="logout()">
      <span class="sb-logout-icon">⏻</span>
      <span class="sb-logout-label">Logout</span>
    </button>
  </div>
</aside>
<div class="main-content">

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-left">
    <div class="page-label">Organizație</div>
    <div class="page-title">🔱 Bratva</div>
    <div class="page-sub">Evidența membrilor, gradelor și echipamentelor.</div>
  </div>
  <button class="btn-save" id="saveBtn" onclick="save()">💾 Salvează</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nume</th>
        <th>CNP</th>
        <th>Telefon</th>
        <th style="text-align:center">Mască</th>
        <th style="text-align:center">Bandană</th>
        <th style="text-align:center">Mănușă</th>
        <th style="text-align:center">Sindicat</th>
        <th>Grad</th>
        <th style="text-align:center">Învoire</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="toast" id="toast">✓ Date salvate cu succes</div>

<script>
let user;

const grades = ["Pakhan","Spetsnaz","Sovetink","Brigadir","Obshchak","Vor v Zakone"];

async function init(){
  const res = await fetch("/me");
  user = await res.json();
  if(!user){ location.href="bratva-login.html"; return; }
  document.getElementById("navUsername").textContent = user.username;
  if(user.role && user.role.toLowerCase() === "leader"){
    document.getElementById("adminLink").style.display = "";
  }
  load();
}

function createRows(data=[]){
  const tbody = document.getElementById("tableBody");
  let html = "";

  const isLeader = user.role === "leader";

  for(let i=0;i<35;i++){
    const d = data[i]||{};

    if(isLeader){
      const makeCheck = (val) => `
        <div class="check-wrap ${val?"checked":""}">
          <input type="checkbox" ${val?"checked":""}>
          <span class="check-icon">${val?"✓":""}</span>
        </div>`;
      html += `<tr>
        <td class="row-num">${i+1}</td>
        <td><input value="${d.nume||""}" placeholder="—"></td>
        <td><input value="${d.cnp||""}" placeholder="—"></td>
        <td><input value="${d.telefon||""}" placeholder="—"></td>
        <td class="checkbox-cell">${makeCheck(d.masca)}</td>
        <td class="checkbox-cell">${makeCheck(d.bandana)}</td>
        <td class="checkbox-cell">${makeCheck(d.manusa)}</td>
        <td class="checkbox-cell">${makeCheck(d.sindicat)}</td>
        <td><select class="grade-select">${grades.map(g=>`<option ${d.grad===g?"selected":""}>${g}</option>`).join("")}</select></td>
        <td class="checkbox-cell"><span class="cell-text ${d.invoire==="Da"?"":"muted"}" style="text-align:center;color:${d.invoire==="Da"?"var(--red-bright)":"var(--muted)"}">${d.invoire||"Nu"}</span></td>
      </tr>`;
    } else {
      const sc = (val) => `<div class="check-static ${val?"checked":""}">${val?"✓":""}</div>`;
      const sv = (v) => `<span class="cell-text ${v?"":"muted"}">${v||"—"}</span>`;
      html += `<tr>
        <td class="row-num">${i+1}</td>
        <td>${sv(d.nume)}</td>
        <td>${sv(d.cnp)}</td>
        <td>${sv(d.telefon)}</td>
        <td class="checkbox-cell">${sc(d.masca)}</td>
        <td class="checkbox-cell">${sc(d.bandana)}</td>
        <td class="checkbox-cell">${sc(d.manusa)}</td>
        <td class="checkbox-cell">${sc(d.sindicat)}</td>
        <td><span class="grade-text">${d.grad||grades[0]}</span></td>
        <td class="checkbox-cell"><span class="cell-text" style="text-align:center;color:${d.invoire==="Da"?"var(--red-bright)":"var(--muted)"}">${d.invoire||"Nu"}</span></td>
      </tr>`;
    }
  }

  tbody.innerHTML = html;

  // Wire checkboxes (leader only)
  if(isLeader){
    document.querySelectorAll(".check-wrap input[type='checkbox']").forEach(cb=>{
      cb.addEventListener("change", ()=>{
        const wrap = cb.closest(".check-wrap");
        wrap.classList.toggle("checked", cb.checked);
        wrap.querySelector(".check-icon").textContent = cb.checked ? "✓" : "";
      });
    });
  }

  if(!isLeader){
    document.getElementById("saveBtn").style.display="none";
  }
}

async function load(){
  const res = await fetch("/bratva");
  const data = await res.json();
  createRows(data);
}

async function save(){
  const rows = document.querySelectorAll("#tableBody tr");
  const data = [];

  rows.forEach(r=>{
    const inputs = r.querySelectorAll("input:not([type='checkbox']), select");
    const checks = r.querySelectorAll("input[type='checkbox']");
    data.push({
      nume: inputs[0].value,
      cnp: inputs[1].value,
      telefon: inputs[2].value,
      masca: checks[0].checked,
      bandana: checks[1].checked,
      manusa: checks[2].checked,
      sindicat: checks[3].checked,
      grad: inputs[3].value
    });
  });

  await fetch("/bratva",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  showToast();
}

function showToast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3000);
}

async function logout(){
  await fetch("/logout",{method:"POST"}).catch(()=>{});
  location.href="bratva-login.html";
}

init();
</script>
<script src="notifications.js"></script>
</div>
</body>
</html>
